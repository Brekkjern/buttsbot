name: Go

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build -o dist/ -v ./...

      - name: Test
        run: go test -v ./...

      - name: Archive build
        uses: actions/upload-artifact@v4
        with:
          name: buttsbot
          path: dist/buttsbot

      - name: Update latest tag
        if: github.event_name == 'push'
        run: git tag -f latest && git push -f origin latest

      - name: Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          tag_name: latest
          prerelease: true
          name: "Development Build"
          files: |
            LICENSE.md
            dist/buttsbot
